<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Python Task Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Azure Python Task Manager</h1>
        <p>My second Azure portfolio project</p>

        <form method="POST" action="/add">
            <input type="text" name="task" placeholder="Enter a new task" required>
            <button type="submit">Add Task</button>
        </form>

        <ul>
            {% for task in tasks %}
                <li>
                    {{ task.name }}
                    <a href="/delete/{{ task.RowKey }}" class="delete-btn">✕</a>
                </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
